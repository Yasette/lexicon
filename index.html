uality of seeming true or of having the appearance of being real",t:"ger\xE7eklik; konusunda inand\u0131r\u0131c\u0131l\u0131k/ger\xE7ek\xE7ilik\u201D",e:"She has included photographs in the book to lend verisimilitude to the story."},{id:221,w:"Susceptible to",wk:4,src:1,d:"easily influenced or harmed by something",t:"duyarl\u0131",e:"These plants are particularly susceptible to frost."},{id:222,w:"Earnest",wk:4,src:1,d:"serious and determined, especially too serious and unable to find your own actions funny",t:"samimi, ciddi, a\u011F\u0131rba\u015Fl\u0131?; resulting from or showing sincere and intense conviction."},{id:223,w:"Equanimity",wk:4,src:1,d:"a calm mental state, especially after a shock or disappointment or in a difficult situation",t:"dinginlik, sakinlik",e:"Three years after the tragedy she has only just begun to regain her equanimity."},{id:224,w:"Proclaim",wk:4,src:1,d:"to announce something publicly or officially, especially something positive",t:"ilan etmek",e:"He took command of the government and proclaimed himself emperor."},{id:225,w:"Impenetrable",wk:4,src:1,d:"impossible to see through, go through, or understand",t:"ge\xE7ilmez, anla\u015F\u0131lmaz; penetrable ge\xE7ilebilir, n\xFCfuz edilebilir",e:"Outside, the fog was thick and impenetrable."},{id:226,w:"Novel",wk:4,src:1,d:"new and original, not like anything seen before",t:"yeni, \xF6zg\xFCn (adj.)",n:"New"},{id:227,w:"Precursor",wk:4,src:1,d:"something that happened or existed before another thing, especially if it either developed into it or had an influence on it",t:"\xF6nc\xFC; veya ilk",e:"Sulphur dioxide is the main precursor of acid rain."},{id:228,w:"Reciprocate",wk:4,src:1,d:"to share the same feelings as someone else, or to behave in the same way as someone else",t:"kar\u015F\u0131l\u0131kl\u0131 olmak, kar\u015F\u0131l\u0131k vermek (duygu wise)"},{id:229,w:"Prevail",wk:4,src:1,d:"to get control or influence",t:"succumb z\u0131tt\u0131; \xFCst\xFCnl\xFCk sa\u011Flamak, yenmek .serif-d{font-family:'Fraunces',serif}
.lab{font-family:'Newsreader',serif;font-weight:600;letter-spacing:.14em;text-transform:uppercase;font-size:11px;color:var(--mute)}
.lab.dark{color:var(--ink2)}
.mast{padding:26px 0 10px;text-align:center}
.mast h1{font-family:'Fraunces',serif;font-weight:640;font-size:34px;letter-spacing:.01em;font-variation-settings:'opsz' 144,'SOFT' 60}
.mast .sub{margin-top:2px;font-style:italic;color:var(--ink2);font-size:15.5px}
.drule{height:7px;border-top:1px solid var(--rule2);border-bottom:1px solid var(--rule2);margin:12px 0}
.drule.tight{margin:8px 0}
.card{background:var(--card);border:1px solid var(--rule);border-radius:14px;box-shadow:var(--shadow)}
.section{margin-top:18px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-family:'Newsreader',serif;border-radius:12px;transition:transform .08s ease,box-shadow .12s ease,background .12s ease;user-select:none}
.btn:active{transform:scale(.97)}
.btn:focus-visible{outline:2.5px solid var(--gold);outline-offset:2px}
.btn-hero{width:100%;padding:15px 18px;background:var(--ox);color:#FBF3E4;font-size:18px;font-weight:600;letter-spacing:.01em;box-shadow:0 2px 0 #6d2410,var(--shadow)}
.btn-hero:hover{background:var(--ox2)}
.btn-line{width:100%;padding:13px 16px;background:transparent;color:var(--ink);border:1.5px solid var(--rule2);font-size:16.5px;font-weight:500}
.btn-line:hover{background:var(--paper2)}
.btn-sm{padding:8px 14px;font-size:14.5px;border-radius:10px}
.chiprow{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 13px;border-radius:999px;border:1.5px solid var(--rule2);background:transparent;color:var(--ink2);font-size:14.5px;font-family:'Newsreader',serif;cursor:pointer;transition:all .1s}
.chip.on{background:var(--ink);border-color:var(--ink);color:var(--paper)}
.chip:focus-visible{outline:2.5px solid var(--gold);outline-offset:2px}
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{background:var(--card);border:1px solid var(--rule);border-radius:12px;padding:10px 6px 9px;text-align:center}
.stat b{display:block;font-family:'Fraunces',serif;font-size:22px;font-weight:600;line-height:1.1}
.stat span{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);font-weight:600}
.stat.hot b{color:var(--ox)}
.stat.calm b{color:var(--sage)}

/* nav */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:50;background:linear-gradient(to top,var(--paper) 78%,rgba(245,238,220,0));padding:8px 12px calc(10px + env(safe-area-inset-bottom))}
.nav-inner{max-width:560px;margin:0 auto;background:var(--raise);border:1px solid var(--rule2);border-radius:16px;box-shadow:var(--shadow);display:flex}
.nav-btn{flex:1;padding:9px 4px 7px;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:var(--mute);border-radius:14px}
.nav-btn .nlab{font-family:'Newsreader',serif;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600}
.nav-btn.on{color:var(--ox)}
.nav-btn:focus-visible{outline:2.5px solid var(--gold);outline-offset:-2px}

/* flashcard */
.fc{background:var(--raise);border:1px solid var(--rule2);border-radius:18px;box-shadow:var(--shadow);padding:26px 22px 22px;min-height:330px;display:flex;flex-direction:column;cursor:pointer;position:relative;overflow:hidden}
.fc:focus-visible{outline:3px solid var(--gold);outline-offset:3px}
.fc .wknum{position:absolute;top:16px;right:18px;font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--gold)}
.fc .trickytag{position:absolute;top:16px;left:18px;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--ox);border:1px solid var(--ox);border-radius:999px;padding:2px 8px;opacity:.85}
.fc .head{font-family:'Fraunces',serif;font-weight:560;font-size:clamp(30px,9vw,42px);line-height:1.08;text-align:center;margin:auto 0;font-variation-settings:'opsz' 144;overflow-wrap:anywhere}
.fc .head.small{font-size:clamp(21px,6vw,27px);font-weight:480;font-style:italic;line-height:1.3}
.fc .revealhint{text-align:center;color:var(--mute);font-style:italic;font-size:14.5px;padding-top:14px}
.fc .body{animation:rise .28s ease both;border-top:1px solid var(--rule);margin-top:14px;padding-top:14px}
@keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.fc .defn{font-size:18.5px;line-height:1.5;color:var(--ink)}
.fc .tr{margin-top:9px;font-size:17px;color:var(--ox);font-weight:500}
.fc .ex{margin-top:10px;font-style:italic;color:var(--ink2);font-size:15.5px;border-left:2.5px solid var(--rule2);padding-left:10px}
.fc .nt{margin-top:9px;font-size:14px;color:var(--gold);font-weight:600}
.ansrow{display:flex;gap:10px;margin-top:14px}
.ansrow .btn{flex:1;padding:15px 10px;font-size:17.5px;font-weight:600}
.btn-again{background:var(--oxsoft);color:var(--ox);border:1.5px solid var(--ox)}
.btn-again:hover{background:#ecd0bf}
.btn-got{background:var(--sage);color:#F2F1E6;box-shadow:0 2px 0 #36452c}
.btn-got:hover{background:#54674a}
.sessbar{height:5px;background:var(--paper2);border-radius:99px;overflow:hidden;margin:10px 0 14px}
.sessbar i{display:block;height:100%;background:var(--gold);border-radius:99px;transition:width .25s ease}

/* quiz */
.qopt{width:100%;text-align:left;padding:13px 15px;margin-top:9px;background:var(--raise);border:1.5px solid var(--rule2);border-radius:12px;font-family:'Newsreader',serif;font-size:16.5px;line-height:1.4;cursor:pointer;transition:all .1s;color:var(--ink)}
.qopt:hover{background:var(--card)}
.qopt:focus-visible{outline:2.5px solid var(--gold);outline-offset:2px}
.qopt.right{background:var(--sagesoft);border-color:var(--sage);color:#2e3a25;font-weight:600}
.qopt.wrong{background:var(--oxsoft);border-color:var(--ox);color:var(--ox)}
.qopt.dim{opacity:.5}
.qopt:disabled{cursor:default}

/* word list */
.searchrow{display:flex;align-items:center;gap:8px;background:var(--raise);border:1.5px solid var(--rule2);border-radius:12px;padding:10px 13px;margin-top:12px}
.searchrow input{flex:1;border:none;background:transparent;font-family:'Newsreader',serif;font-size:16.5px;color:var(--ink);outline:none}
.wrow{display:flex;align-items:baseline;gap:10px;width:100%;text-align:left;padding:12px 4px;border:none;background:none;border-bottom:1px solid var(--rule);cursor:pointer;font-family:'Newsreader',serif}
.wrow:focus-visible{outline:2.5px solid var(--gold);outline-offset:-2px}
.wrow .w{font-family:'Fraunces',serif;font-weight:560;font-size:18.5px;flex-shrink:0;max-width:52%}
.wrow .g{flex:1;color:var(--ink2);font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}
.wrow .dots{flex-shrink:0;display:flex;gap:2.5px}
.dot{width:6px;height:6px;border-radius:99px;background:var(--rule2)}
.dot.f{background:var(--sage)}
.wrow.trk .w{color:var(--ox)}

/* sheets / modals */
.veil{position:fixed;inset:0;background:rgba(31,24,14,.45);z-index:90;animation:fade .18s ease both}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:95;max-width:560px;margin:0 auto;background:var(--paper);border:1px solid var(--rule2);border-bottom:none;border-radius:20px 20px 0 0;box-shadow:0 -8px 30px rgba(38,28,14,.3);max-height:88vh;overflow-y:auto;padding:18px 18px calc(20px + env(safe-area-inset-bottom));animation:up .22s ease both}
@keyframes up{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet h3{font-family:'Fraunces',serif;font-weight:600;font-size:22px}
.field{margin-top:12px}
.field label{display:block;font-size:12px;letter-spacing:.11em;text-transform:uppercase;font-weight:600;color:var(--mute);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;background:var(--raise);border:1.5px solid var(--rule2);border-radius:10px;padding:10px 12px;font-family:'Newsreader',serif;font-size:16px;color:var(--ink)}
.field textarea{resize:vertical;min-height:90px;line-height:1.45}
.field input:focus,.field textarea:focus,.field select:focus{outline:2.5px solid var(--gold);outline-offset:1px}

/* guide */
.acc{border:1px solid var(--rule);border-radius:13px;background:var(--card);margin-top:11px;overflow:hidden}
.acc-h{width:100%;display:flex;align-items:center;gap:10px;padding:14px 15px;background:none;border:none;cursor:pointer;text-align:left;font-family:'Fraunces',serif;font-size:18px;font-weight:580;color:var(--ink)}
.acc-h:focus-visible{outline:2.5px solid var(--gold);outline-offset:-3px}
.acc-h .n{font-style:italic;color:var(--gold);font-size:15px;min-width:20px}
.acc-b{padding:2px 16px 16px;border-top:1px solid var(--rule);font-size:15.5px}
.acc-b p{margin-top:10px}
.gt{width:100%;border-collapse:collapse;margin-top:10px;font-size:14.5px}
.gt th{text-align:left;padding:6px 8px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);border-bottom:1.5px solid var(--rule2)}
.gt td{padding:7px 8px;border-bottom:1px solid var(--rule);vertical-align:top;line-height:1.4}
.gt td:first-child{font-weight:600;white-space:nowrap}
.gt tr:last-child td{border-bottom:none}
.ok{color:var(--sage);font-weight:600}
.no{color:var(--ox);font-weight:600}
.trap{margin-top:12px;background:var(--oxsoft);border:1px solid var(--ox);border-radius:10px;padding:10px 12px;font-size:14.5px;color:#5e1f0d}
.trap b{color:var(--ox)}
.tip{margin-top:12px;background:var(--goldsoft);border:1px solid var(--gold);border-radius:10px;padding:10px 12px;font-size:14.5px;color:#5c4517}
.steps{margin:10px 0 0;padding-left:0;list-style:none;counter-reset:st}
.steps li{counter-increment:st;position:relative;padding:7px 0 7px 34px;border-bottom:1px dashed var(--rule)}
.steps li:last-child{border-bottom:none}
.steps li::before{content:counter(st);position:absolute;left:2px;top:7px;font-family:'Fraunces',serif;font-style:italic;font-weight:600;color:var(--ox);font-size:17px;width:22px;text-align:center}
.pb-tag{display:inline-block;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;border-radius:999px;padding:2.5px 9px;margin-left:8px;vertical-align:2px}
.pb-tag.focus{background:var(--ox);color:#FBF3E4}
.pb-tag.range{border:1px solid var(--rule2);color:var(--mute)}
.wordcols{columns:2;column-gap:18px;margin-top:8px;font-size:14.5px}
.wordcols div{break-inside:avoid;padding:2px 0}
.banner{margin-top:12px;background:var(--goldsoft);border:1px solid var(--gold);border-radius:12px;padding:11px 13px;font-size:14.5px;color:#5c4517}
.err{margin-top:12px;background:var(--oxsoft);border:1px solid var(--ox);border-radius:12px;padding:11px 13px;font-size:14.5px;color:#5e1f0d}
.fadein{animation:fade .25s ease both}
.center{text-align:center}
.boot{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.boot .fleur{font-family:'Fraunces',serif;font-size:44px;color:var(--ox);animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
